# Python dependency configuration
id: python
name: Python
description: Python programming language interpreter
homepage: https://www.python.org
license: PSF-2.0

provides:
  - python
  - python3
  - pip
  - pip3

# Environment requirements by version
version_requirements:
  "3.12+":
    min_versions:
      openssl: "1.1.1"
  "3.11+":
    min_versions:
      openssl: "1.1.1"
  "3.10+":
    min_versions:
      openssl: "1.0.2"

platforms:
  linux:
    distros:
      debian:
        package_manager: apt
        install_methods:
          - type: package_manager
            priority: 1
            recommended: true
            commands:
              - sudo apt-get update
              - sudo apt-get install -y python3 python3-pip python3-venv
            verify_cmd: python3 --version
            sudo_required: true
      ubuntu:
        package_manager: apt
        install_methods:
          - type: package_manager
            priority: 1
            recommended: true
            commands:
              - sudo apt-get update
              - sudo apt-get install -y python3 python3-pip python3-venv
            verify_cmd: python3 --version
            sudo_required: true
          - type: deadsnakes
            priority: 2
            commands:
              - sudo add-apt-repository -y ppa:deadsnakes/ppa
              - sudo apt-get update
              - sudo apt-get install -y python3.12 python3.12-venv python3.12-dev
            verify_cmd: python3.12 --version
            sudo_required: true
            notes: "Installs specific Python version via deadsnakes PPA"
      centos:
        package_manager: yum
        version_limits:
          - os_version: "<=7"
            max_software_version: "3.6"
            reason: "CentOS 7 default Python 3 is 3.6"
            workaround: "Use pyenv to install newer Python versions, or compile from source"
        install_methods:
          - type: package_manager
            priority: 1
            commands:
              - sudo yum install -y python3 python3-pip
            verify_cmd: python3 --version
            sudo_required: true
          - type: epel
            priority: 2
            commands:
              - sudo yum install -y epel-release
              - sudo yum install -y python3 python3-pip
            verify_cmd: python3 --version
            sudo_required: true
      rhel:
        package_manager: yum
        install_methods:
          - type: package_manager
            priority: 1
            commands:
              - sudo yum install -y python3 python3-pip
            verify_cmd: python3 --version
            sudo_required: true
      fedora:
        package_manager: dnf
        install_methods:
          - type: package_manager
            priority: 1
            commands:
              - sudo dnf install -y python3 python3-pip
            verify_cmd: python3 --version
            sudo_required: true
      arch:
        package_manager: pacman
        install_methods:
          - type: package_manager
            priority: 1
            commands:
              - sudo pacman -S --noconfirm python python-pip
            verify_cmd: python --version
            sudo_required: true
      alpine:
        package_manager: apk
        install_methods:
          - type: package_manager
            priority: 1
            commands:
              - apk add --no-cache python3 py3-pip
            verify_cmd: python3 --version
            sudo_required: false
    # Generic Linux fallback using pyenv
    install_methods:
      - type: pyenv
        priority: 2
        commands:
          - curl https://pyenv.run | bash
          - export PATH="$HOME/.pyenv/bin:$PATH"
          - pyenv install 3.12
          - pyenv global 3.12
        verify_cmd: python --version
        sudo_required: false
        notes: "Installs pyenv and Python 3.12"

  darwin:
    install_methods:
      - type: homebrew
        priority: 1
        recommended: true
        commands:
          - brew install python@3.12
        verify_cmd: python3 --version
        sudo_required: false
      - type: pyenv
        priority: 2
        commands:
          - brew install pyenv
          - pyenv install 3.12
          - pyenv global 3.12
        verify_cmd: python --version
        sudo_required: false

  windows:
    install_methods:
      - type: winget
        priority: 1
        recommended: true
        commands:
          - winget install Python.Python.3.12 --accept-source-agreements --accept-package-agreements
        verify_cmd: python --version
        sudo_required: false
      - type: chocolatey
        priority: 2
        commands:
          - choco install python312 -y
        verify_cmd: python --version
        sudo_required: false
      - type: scoop
        priority: 3
        commands:
          - scoop install python
        verify_cmd: python --version
        sudo_required: false
